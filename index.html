<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROG_DEV | Especialista en Sistemas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { 
            --bg: #0b0f19; 
            --card: #161b2a; 
            --accent: #00d2ff; 
            --text: #e2e8f0;
        }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header { border-bottom: 1px solid rgba(0, 210, 255, 0.1); }
        .project-img { height: 200px; object-fit: cover; border-bottom: 2px solid var(--accent); }
        .card-custom { 
            background: var(--card); 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: 0.3s ease-in-out; 
        }
        .card-custom:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 10px 30px rgba(0,210,255,0.15); 
            border-color: var(--accent);
        }
        .tech-pill { 
            background: rgba(0, 210, 255, 0.1); 
            color: var(--accent); 
            border: 1px solid var(--accent); 
            font-size: 0.75rem; 
            margin-right: 5px;
        }
        .carousel-item img {
            max-height: 70vh;
            object-fit: contain;
            background-color: #000;
        }
        footer { margin-top: auto; }
        
        /* Estilo extra para botones de contacto */
        .btn-wsp { background-color: #25d366; border: none; color: white; }
        .btn-wsp:hover { background-color: #1ebe57; color: white; }
    </style>
</head>
<body>

<header class="py-5 text-center bg-dark bg-gradient shadow-sm">
    <div class="container">
        <h1 class="display-4 fw-bold">PROG_<span style="color: var(--accent);">DEV</span></h1>
        <p class="lead opacity-75">Especialista en Soluciones de Inventario y Lógica de Negocio</p>
        <div class="mt-3">
            <span class="badge rounded-pill bg-secondary px-3">Backend Developer</span>
            <span class="badge rounded-pill bg-info text-dark px-3">PHP & MySQL</span>
        </div>
    </div>
</header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <h3 class="mb-4 text-center"><i class="bi bi-code-slash"></i> Proyectos Destacados</h3>
            
            <div class="card card-custom shadow-lg">
                <img src="img/image_2.png" class="card-img-top project-img" alt="Sistema de Inventario">
                <div class="card-body">
